<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f2efe9">
<title>Nerve</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #efebe4;
  font-family: 'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
  overscroll-behavior: none;
}
canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
/* Name capture overlay — transparent so the canvas grain shows through */
/* Name prompt — floats over the death screen, no panel/box, no backdrop */
#nameOv {
  position: fixed; inset: 0; z-index: 20;
  display: none; align-items: center; justify-content: center;
  pointer-events: none;
}
#nameOv.show { display: flex; pointer-events: auto; }
#nameOv .card {
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}
#nameOv .q {
  font: 500 11px 'Helvetica Neue', Helvetica, Arial, sans-serif;
  letter-spacing: 0.3em; color: #a8a298; text-transform: uppercase;
  padding-top: 48px;
}
#nameInput {
  background: transparent; border: none; border-bottom: 1.5px solid #8a857c;
  color: #3f3a33; text-align: center; text-transform: uppercase; outline: none;
  font: 700 34px 'Helvetica Neue', Helvetica, Arial, sans-serif;
  letter-spacing: 0.04em; padding: 6px 6px; width: min(70vw, 320px);
}
#nameInput:focus { border-bottom-color: #3f3a33; }
#nameOv .row { display: flex; align-items: baseline; gap: 28px; }
#saveBtn {
  background: transparent; border: none; cursor: pointer; padding: 6px 2px;
  color: #3f3a33; text-transform: uppercase;
  font: 600 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 0.28em;
}
#skipBtn {
  background: transparent; border: none; cursor: pointer; padding: 6px 2px;
  color: #a8a298; text-transform: uppercase;
  font: 600 12px 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 0.28em;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="nameOv">
  <div class="card">
    <div class="q">What's your name?</div>
    <input id="nameInput" maxlength="16" autocomplete="off" autocapitalize="characters" spellcheck="false" />
    <div class="row">
      <button id="saveBtn">Save →</button>
      <button id="skipBtn">skip</button>
    </div>
  </div>
</div>
<script>
(() => {
'use strict';

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ─── Palettes (iridescent gradient orbs) ─────────────────────────────────────
// hi = inner highlight, c1/c2 = body hues, edge = rim, acc = iridescent bloom, glow = halo
const COOL = [
  { hi:[227,236,249], c1:[150,190,240], c2:[193,168,232], edge:[140,152,214], acc:[255,201,226], glow:[181,201,242] }, // blue→lavender→pink
  { hi:[231,225,251], c1:[140,124,240], c2:[181,167,245], edge:[118,106,208], acc:[201,182,255], glow:[177,165,245] }, // violet
  { hi:[233,250,241], c1:[111,217,192], c2:[152,201,230], edge:[ 88,180,170], acc:[243,224,138], glow:[151,221,201] }, // mint→teal
  { hi:[224,240,247], c1:[122,196,224], c2:[171,182,232], edge:[104,150,200], acc:[230,196,238], glow:[160,200,232] }, // ice
];
const HOT = [
  { hi:[255,224,207], c1:[255,154,107], c2:[255, 93,143], edge:[206, 78,138], acc:[201, 92,192], glow:[255,179,143] }, // sunset
  { hi:[255,230,239], c1:[255, 90,125], c2:[208, 75,196], edge:[150, 60,140], acc:[120, 90,180], glow:[255,150,180] }, // pink fire
  { hi:[246,236,226], c1:[ 82, 92,132], c2:[150,110,140], edge:[ 58, 58, 94], acc:[208,160,106], glow:[150,130,150] }, // hallucinate
  { hi:[255,236,210], c1:[255,176, 92], c2:[233,118, 96], edge:[190, 92, 96], acc:[238,108,150], glow:[255,196,150] }, // amber→coral
];
const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;
const darken = (c, f) => [c[0]*f|0, c[1]*f|0, c[2]*f|0];
const pick = arr => arr[(Math.random() * arr.length) | 0];

// ─── Organic liquid blobs (animated metaballs) ───────────────────────────────
// One soft lobe sprite is baked per palette. A blob is several of these lobes
// that drift & swell on independent sine waves, so its silhouette morphs like
// liquid ink. Overlaps deepen the core; the global grain adds the printed grit.
const LOBE = 200, LOBE_PAD = 1.3, TAU = Math.PI * 2;
function renderLobe(pal) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = LOBE;
  const x = cv.getContext('2d');
  x.translate(LOBE / 2, LOBE / 2);
  const r = LOBE / 2 / LOBE_PAD;
  x.filter = `blur(${(r * 0.22).toFixed(1)}px)`;
  // No hard dark core — a soft rich center that fades smoothly. Depth comes from
  // overlapping lobes accumulating, not from one near-black dot per lobe.
  const g = x.createRadialGradient(0, 0, 0, 0, 0, r);
  g.addColorStop(0,    rgba(pal.edge, 0.5));
  g.addColorStop(0.35, rgba(pal.c1,   0.46));
  g.addColorStop(0.70, rgba(pal.c2,   0.24));
  g.addColorStop(1,    rgba(pal.c2,   0));
  x.fillStyle = g;
  x.beginPath(); x.arc(0, 0, r, 0, TAU); x.fill();
  return cv;
}
[...COOL, ...HOT].forEach(p => { p.lobe = renderLobe(p); });

const rnd = Math.random;
function lobe(ox, oy, rr, morph) {
  return {
    ox, oy, rr,
    // drift (offset wobble) + swell (radius wobble), each its own freq & phase.
    // morph scales the amplitudes so some blobs are calm, others very liquid.
    fxo: 0.0005 + rnd() * 0.0012, fyo: 0.0005 + rnd() * 0.0012, fr: 0.0006 + rnd() * 0.0014,
    axo: (0.05 + rnd() * 0.14) * morph, ayo: (0.05 + rnd() * 0.14) * morph, ar: (0.10 + rnd() * 0.20) * morph,
    pxo: rnd() * TAU,                   pyo: rnd() * TAU,                   pr: rnd() * TAU,
  };
}
// Each blob picks its own character: how many lobes, how far they spread, how
// liquid it morphs — so silhouettes range from tight droplets to sprawling amoebas.
function makeLobes(sf = 1) {
  const spread = 0.18 + rnd() * 0.42;                    // tight ↔ sprawling, pushed wider
  const morph  = (0.5 + rnd() * 1.0) * (0.6 + sf * 0.7); // bigger blobs morph more liquidly
  const baseR  = 0.40 + rnd() * 0.34;
  const n = 3 + (rnd() * (3 + rnd() * 6) | 0); // ~3–11 lobes → bumpier outline
  // off-centre, smaller "core" so the blob isn't a dominant round mass
  const lobes = [lobe(Math.cos(rnd()*TAU)*spread*0.3, Math.sin(rnd()*TAU)*spread*0.3,
                      baseR * (0.85 + rnd() * 0.4), morph)];
  for (let i = 0; i < n; i++) {
    const a = rnd() * TAU, d = spread * (0.5 + rnd() * 1.15);
    lobes.push(lobe(Math.cos(a) * d, Math.sin(a) * d, baseR * (0.28 + rnd() * 0.9), morph));
  }
  return lobes;
}

// ─── Film grain (pre-rendered tile) ───────────────────────────────────────────
const grain = document.createElement('canvas');
grain.width = grain.height = 180;
(() => {
  const g = grain.getContext('2d');
  const id = g.createImageData(180, 180);
  for (let i = 0; i < id.data.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = (Math.random() * 42) | 0;
  }
  g.putImageData(id, 0, 0);
})();
const grainPattern = ctx.createPattern(grain, 'repeat');

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'intro';                    // intro | onboard | playing | over | won | board
let highScore = +localStorage.getItem('ns_nerve') || 0; // best NERVE
let elapsed = 0;

// ─── Leaderboard backend (Supabase REST) ─────────────────────────────────────
const SB_URL = 'https://fmkhgkkwhvjgmsidlkqv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZta2hna2t3aHZqZ21zaWRsa3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjA5NjIsImV4cCI6MjA5ODQzNjk2Mn0.HakHFZbLpuQpdHZZYPRqZerb9NlancMBosJaelxjo24';
const SB_H = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY };

// onboarding / player identity
let sessions = +localStorage.getItem('nerve_sessions') || 0;
let playerName = localStorage.getItem('nerve_player_name') || '';
let namePrompt = false, pendingScore = 0;
// non-interactive onboarding: one scripted, illustrative sequence
let obT = 0, obBlobsSpawned = false, obPulsed = false;

// leaderboard
let boardRows = null, boardFrom = 'intro', boardMe = null;
// tap targets recorded during draw
let linkIntroBoard = null, linkOverBoard = null, linkOverClose = null;

// ─── Risk–reward: NERVE is the score, earned only by grazing danger ──────────--
// graze = proximity to nearest ink (0 far → 1 touching); it drives a multiplier
// and the rate you bank NERVE. Hugging the ink is where the points are.
let nerve = 0, mult = 1, graze = 0, scoreTick = 0;
const DANGER_BAND = 82, MAX_MULT = 5;
// high-score moment: best-to-beat snapshotted at game start; fires once when passed
let runStartBest = 0, hiTriggered = false, hiPulseStart = -9999;
const sstep = x => x * x * (3 - 2 * x);

// ─── PULSE mechanic ───────────────────────────────────────────────────────────
// SPACE pushes all blobs away for ~3s, then they drift home. 3 uses per game.
const PULSE_USES = 3, PULSE_MAX = 240;
let pulseUses = PULSE_USES, pulseActive = false, pulseElapsed = 0;
// one-time "SPACE TO PULSE" hint on the first critical near-miss (persisted)
let hintShown = !!localStorage.getItem('nerve_pulsehint'), hintStart = -9999;
let ringActive = false, ringT = 0, ringX = 0, ringY = 0; // expanding wave visual
const pulseIcons = [0, 1, 2].map(i => ({ pal: COOL[i % COOL.length], lobes: makeLobes(0.4), a: 1 }));

// intro screen — dots that fade in/out at random spots (world is already alive)
let introDots = [], introNextSpawn = 0;
const motes = [];          // collectible glints that sit in the risky gaps
let moteTimer = 0, collected = 0, moteSpawnCount = 0, reachTimer = 0;
const MOTE_MSGS = ['COLLECT ME', 'CATCH ME', 'OVER HERE', 'GRAB ME'];
const floats = [];         // rising "+NERVE" popups that teach the scoring

// ─── Player ──────────────────────────────────────────────────────────────────
const PLAYER_R = 5;
let px, py, pdx = 0, pdy = 0, targetX, targetY;
let pulse = 0;

// ─── Shapes ────────────────────────────────────────────────────────────────--
const shapes = [];
let spawnTimer = 0, ambushTimer = 0, nextSpawn = 600;
// camp detection: how long the player has lingered within CAMP_R of an anchor.
// Must sit a good while (CAMP_FULL) before ink forms under you, with a visible
// warning over the last CAMP_WARN ms so it's never a surprise.
let campX = 0, campY = 0, campTime = 0;
const CAMP_R = 115, CAMP_FULL = 3000, CAMP_WARN = 1400;

// When this fraction of the screen is occupied by ink, the void is "full" → WIN.
// Score is your progress toward it (0–100%), measured precisely from real coverage.
const WIN_FILL = 0.62;
let occupancy = 0, occTimer = 0, progress = 0;

// ─── Pointer ───────────────────────────────────────────────────────────────--
let pointerActive = false;
function onPointerMove(e) {
  const r = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  targetX = (cx - r.left) * (W / r.width);
  targetY = (cy - r.top)  * (H / r.height);
  pointerActive = true;
}
function onPointerEnd() { pointerActive = false; }
canvas.addEventListener('mousemove',  onPointerMove);
canvas.addEventListener('touchmove',  onPointerMove, { passive: true });
canvas.addEventListener('touchstart', onPointerMove, { passive: true });
canvas.addEventListener('touchend',   onPointerEnd);
function toCanvas(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return [(clientX - r.left) * (W / r.width), (clientY - r.top) * (H / r.height)];
}
canvas.addEventListener('click', e => onTap(...toCanvas(e.clientX, e.clientY)));
let lastTouchEnd = 0;
canvas.addEventListener('touchend', e => {
  if (!e.changedTouches.length) return;
  const now = Date.now();
  if (now - lastTouchEnd < 300) return;
  lastTouchEnd = now;
  onTap(...toCanvas(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
}, { passive: true });

const inRect = (x, y, r) => r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

// SPACE fires a pulse during play (if uses remain)
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    if (state === 'playing') firePulse();
  }
});
function firePulse() {
  if (pulseUses <= 0) return;
  pulseUses--;
  playPulse();
  pulseActive = true; pulseElapsed = 0;
  ringActive = true; ringT = 0; ringX = px; ringY = py;
  for (const s of shapes) {                 // capture an outward push dir per blob
    const hx = s.homeX ?? s.x, hy = s.homeY ?? s.y;
    let dx = hx - px, dy = hy - py, d = Math.hypot(dx, dy) || 1;
    s.pushDX = dx / d * PULSE_MAX; s.pushDY = dy / d * PULSE_MAX;
  }
}

function onTap(cx, cy) {
  if (namePrompt) return;                 // DOM overlay handles its own clicks
  if (state === 'board') { closeBoard(); return; }
  if (state === 'intro') {
    if (inRect(cx, cy, linkIntroBoard)) { openBoard('intro'); return; }
    beginFromIntro(); return;
  }
  if (state === 'over') {
    if (inRect(cx, cy, linkOverClose)) { state = 'intro'; return; }
    if (inRect(cx, cy, linkOverBoard)) { openBoard('over'); return; }
    startGame(); return;
  }
  if (state === 'won') startGame();
}

// First taps of a fresh player get the onboarding sequence, then the game.
function beginFromIntro() {
  ensureAudio();
  if (sessions < 2) startOnboarding();
  else startGame();
}

// ─── Non-interactive onboarding — one scripted, illustrative sequence ────────
// 0–2100  COLLECT DOTS (dot appears)   2100–4200  AVOID BLOBS (blobs drift in)
// 4200–6300  SPACE TO PULSE (wave; blobs pushed out)   6300–8100  HOW LONG… → game
function startOnboarding() {
  state = 'onboard';
  obT = 0; obBlobsSpawned = false; obPulsed = false; ringActive = false;
  shapes.length = 0; floats.length = 0;
  motes.length = 0; motes.push({ x: W / 2, y: H / 2, life: 1e9, msg: null }); // the dot
}
function spawnObBlobs() {
  shapes.length = 0;
  const cx = W / 2, cy = H / 2, n = 2 + (Math.random() * 2 | 0);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + Math.random() * 0.6, d = Math.min(W, H) * 0.36;
    const maxDim = 170 + Math.random() * 80;
    const s = makeShape(cx + Math.cos(a) * d, cy + Math.sin(a) * d, maxDim, maxDim / (0.7 + Math.random() * 0.6), Math.random() < 0.5);
    s.w = s.maxW; s.h = s.maxH; s.growing = false;     // full size — illustrative only
    shapes.push(s);
  }
}
function updateOnboard(dt, t) {
  obT += dt;
  const cx = W / 2, cy = H / 2;
  const breathe = s => { const pf = Math.sin(t * s.pulseFreq + s.pulsePhase); s.drawW = s.w * (1 + pf * s.pulseAmp); s.drawH = s.h * (1 + pf * s.pulseAmp); };
  if (obT >= 2100 && !obBlobsSpawned) { obBlobsSpawned = true; spawnObBlobs(); }
  if (obT >= 4200 && !obPulsed) { obPulsed = true; ringActive = true; ringT = 0; ringX = cx; ringY = cy; }
  if (ringActive) { ringT += dt; if (ringT > 600) ringActive = false; }
  for (const s of shapes) {
    if (obT < 4200) {                                  // drift toward the dot
      const k = Math.min(1, dt * 0.0007);
      s.x += (cx - s.x) * k; s.y += (cy - s.y) * k;
    } else {                                           // pushed away by the wave
      const dx = s.x - cx, dy = s.y - cy, d = Math.hypot(dx, dy) || 1;
      s.x += dx / d * dt * 0.06; s.y += dy / d * dt * 0.06;
    }
    breathe(s);
  }
  if (obT >= 8100) startGame();                        // seamless handoff into the game
}

// ─── Leaderboard backend calls ────────────────────────────────────────────────
async function submitScore(name, score) {
  try {
    const q = SB_URL + '/rest/v1/scores?name=eq.' + encodeURIComponent(name) + '&select=id,score';
    const rows = await (await fetch(q, { headers: SB_H })).json();
    if (Array.isArray(rows) && rows.length) {
      if (score > rows[0].score) {
        await fetch(SB_URL + '/rest/v1/scores?id=eq.' + rows[0].id, {
          method: 'PATCH', headers: { ...SB_H, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
          body: JSON.stringify({ score, updated_at: new Date().toISOString() }),
        });
      }
    } else {
      await fetch(SB_URL + '/rest/v1/scores', {
        method: 'POST', headers: { ...SB_H, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
        body: JSON.stringify({ name, score, updated_at: new Date().toISOString() }),
      });
    }
  } catch (e) { /* offline — silently skip */ }
}
async function openBoard(from) {
  boardFrom = from; boardRows = null; boardMe = null; state = 'board';
  try {
    const q = SB_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=10';
    const rows = await (await fetch(q, { headers: SB_H })).json();
    boardRows = Array.isArray(rows) ? rows : [];
    // if the player isn't in the top 10, find their score + true rank
    if (playerName && !boardRows.some(r => (r.name || '').toUpperCase() === playerName.toUpperCase())) {
      const me = await (await fetch(SB_URL + '/rest/v1/scores?select=score&name=eq.' + encodeURIComponent(playerName), { headers: SB_H })).json();
      if (Array.isArray(me) && me.length) {
        const scr = me[0].score;
        const cr = await fetch(SB_URL + '/rest/v1/scores?select=id&score=gt.' + scr, { headers: { ...SB_H, Prefer: 'count=exact', Range: '0-0' } });
        const range = cr.headers.get('content-range'); // "0-0/COUNT"
        const higher = range ? parseInt(range.split('/')[1]) : 0;
        boardMe = { name: playerName, score: scr, rank: higher + 1 };
      }
    }
  } catch (e) { boardRows = []; }
}
function closeBoard() { state = 'intro'; } // closing any overlay returns to intro

// ─── Name capture overlay (DOM) ───────────────────────────────────────────────
const nameOv = document.getElementById('nameOv');
const nameInput = document.getElementById('nameInput');
const saveBtn = document.getElementById('saveBtn');
function showNamePrompt(score) {
  if (state !== 'over') return;
  pendingScore = score; namePrompt = true;
  nameInput.value = ''; nameOv.classList.add('show');
  setTimeout(() => nameInput.focus(), 60);
}
function hideNamePrompt() { namePrompt = false; nameOv.classList.remove('show'); }
async function doSave() {
  const v = nameInput.value.trim();
  hideNamePrompt();
  if (!v) return;                         // skipped: don't submit, don't nag again
  playerName = v; localStorage.setItem('nerve_player_name', v);
  await submitScore(v, pendingScore);
  openBoard('over');                      // straight to the leaderboard after saving
}
saveBtn.addEventListener('click', doSave);
document.getElementById('skipBtn').addEventListener('click', hideNamePrompt); // skip: no submit
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });

// ─── Audio (soft synth pads) ──────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, dur, type = 'sine', vol = 0.12, detune = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  const now = audioCtx.currentTime;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(vol, now + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  o.start(now); o.stop(now + dur);
}
// A single scheduled note (delay & dur in seconds), with a soft attack/decay.
function note(freq, delay, dur, type = 'sine', vol = 0.12, detune = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  const t0 = audioCtx.currentTime + delay;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.025);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

// A soft sine "bloom" — slow swell then fade, the core voice of the whole game.
// Start & end cues are built from these so everything sounds like the same ink.
function bloomNote(freq, delay, dur, vol = 0.06, detune = 0) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = freq; o.detune.value = detune;
  const t0 = audioCtx.currentTime + delay;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + dur * 0.38); // slow swell, like ink spreading
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.start(t0); o.stop(t0 + dur + 0.05);
}

// A single blob appearing — one soft bloom + a fifth shimmer (the reference voice).
const playBloom  = () => { const f = 300 + Math.random()*150; bloomNote(f, 0, 0.6, 0.05); bloomNote(f * 1.5, 0, 0.5, 0.03, 6); };
const playAmbush = () => { tone(170, 0.4, 'triangle', 0.06); };

// START — a rising cluster of blooms, like the first blobs blossoming in.
function playStart() {
  const seq = [294, 392, 494, 659]; // D4 G4 B4 E5 — open & soft
  seq.forEach((f, i) => { bloomNote(f, i * 0.13, 0.75, 0.06); bloomNote(f * 1.5, i * 0.13, 0.6, 0.025, 6); });
  bloomNote(147, 0, 0.95, 0.05);     // warm root bloom
  bloomNote(988, 0.42, 0.6, 0.025);  // final high shimmer
}

// GAME OVER — the same blooms descending, settling into a low pooling bloom.
function playGameOver() {
  const seq = [494, 392, 294, 196]; // B4 G4 D4 G3 — sinking
  seq.forEach((f, i) => { bloomNote(f, i * 0.18, 0.85, 0.06); bloomNote(f * 1.5, i * 0.18, 0.55, 0.022, -4); });
  bloomNote(98,  0.70, 1.7, 0.07, -5); // low bloom pool
  bloomNote(147, 0.74, 1.4, 0.05);
}

// WIN — a bright, resolving chord of blooms blossoming upward: the void is full.
function playWin() {
  const chord = [392, 494, 587, 784, 988]; // G B D G B — open & triumphant
  chord.forEach((f, i) => { bloomNote(f, i * 0.10, 1.4, 0.06); bloomNote(f * 1.5, i * 0.10, 1.0, 0.022, 5); });
  bloomNote(196, 0, 1.8, 0.06);          // warm root
  bloomNote(1318, 0.55, 1.0, 0.03);      // high sparkle
}

// MOTE pickup — a bright little chime, same bloom family, pitched up.
const playMote = () => { bloomNote(1175, 0, 0.3, 0.05); bloomNote(1568, 0.02, 0.28, 0.03); };

// HIGH SCORE — the ONLY sound in the game. A soft sine bell: quiet acknowledgment.
function playHighScore() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = 'sine'; o.frequency.value = 880;
  const t0 = audioCtx.currentTime;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(0.3, t0 + 0.02);        // attack 20ms → peak 0.3
  g.gain.setValueAtTime(0.3, t0 + 0.12);                 // sustain 100ms
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6); // release ~480ms
  o.start(t0); o.stop(t0 + 0.62);
}

// PULSE activation — light and airy: a soft high shimmer that swells outward and
// fades. Gentle upward lift (opening, not bouncing), pure sines, no resonance.
function playPulse() {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime, END = 0.6;
  const master = audioCtx.createGain();
  master.connect(audioCtx.destination);
  master.gain.setValueAtTime(0.0001, t0);
  master.gain.linearRampToValueAtTime(0.18, t0 + 0.04);        // soft swell
  master.gain.exponentialRampToValueAtTime(0.0001, t0 + END);  // light fade
  // an airy chord with a whisper of upward glide — feels like opening outward
  [[523, 0.5], [784, 0.30], [1046, 0.12]].forEach(([f, amp]) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, t0);
    o.frequency.linearRampToValueAtTime(f * 1.06, t0 + END);   // slight lift
    g.gain.value = amp; o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + END + 0.05);
  });
}

// ─── Difficulty ───────────────────────────────────────────────────────────────
function difficulty() {
  const t = elapsed / 1000;
  // gentle opening: a calm ~7s warm-up, then a slow ramp toward full intensity
  const p = Math.min(1, Math.max(0, (t - 7) / 115));
  const ease = p * p * (3 - 2 * p);
  return {
    spawnInterval:  1750 - ease * 1200,         // 1750 → 550 ms
    shapeSpeed:     0.20 + ease * 0.88,          // slow-growing at first
    maxDimBase:     105  + ease * 235,           // smaller blobs early
    ambushChance:   Math.max(0, (t - 14) / 22),  // near-player ambushes only from ~14s
    ambushInterval: Math.max(2000, 6500 - ease * 4400),
    burst:          ease * 0.26,                 // multi-spawn bursts only once ramped
  };
}

// ─── Shapes ────────────────────────────────────────────────────────────────--
function makeShape(x, y, maxW, maxH, hot) {
  const pal = hot ? pick(HOT) : pick(Math.random() > 0.45 ? COOL : HOT);
  const sf = Math.min(2.2, maxW / 250); // size factor — bigger blobs are more alive
  return {
    // start at a visible fraction so the blob POPS into being, then keeps growing
    x, y, homeX: x, homeY: y, w: maxW * 0.22, h: maxH * 0.22, maxW, maxH,
    growing: true,
    pal,
    lobes: makeLobes(sf),
    pulseFreq:  0.0008 + Math.random() * 0.0014,
    pulseAmp:  (0.07 + Math.random() * 0.10) * (0.6 + sf * 0.7), // larger → pulses harder
    pulsePhase: Math.random() * Math.PI * 2,
    born: elapsed,
  };
}
function spawnShape() {
  const d = difficulty();
  // wide size diversity: tiny specks → sprawling masses, with occasional giants
  let maxDim = d.maxDimBase * (0.28 + Math.random() * 1.9);
  if (Math.random() < 0.16) maxDim *= 1.7;
  const aspect = 0.5 + Math.random() * 1.1;
  const maxW = maxDim, maxH = maxDim / aspect;
  let x, y, a = 0;
  const safeR = 100 + Math.max(maxW, maxH) * 0.35;
  do {
    x = maxW * 0.3 + Math.random() * (W - maxW * 0.6);
    y = maxH * 0.3 + Math.random() * (H - maxH * 0.6);
    a++;
  } while (a < 30 && Math.hypot(x - px, y - py) < safeR);
  // never let the fallback drop a blob on the cursor — skip if still too close
  if (Math.hypot(x - px, y - py) < safeR) return;
  shapes.push(makeShape(x, y, maxW, maxH, false));
}
// Place a blob NEAR the player but never under the cursor. `clear` is the minimum
// gap from the player to the blob's edge. Tries several angles and — because
// clamping to screen edges can pull a blob back toward a cornered player — keeps
// the candidate that stays furthest, so it never lands on top of you.
function spawnNear(maxW, maxH, gapMin, gapExtra, hot) {
  // initial footprint half-size (blobs pop in at 22%, lobes spread the edge ~1.5×)
  const clear = maxW * 0.22 * 0.5 * 1.5 + PLAYER_R + gapMin;
  let best = null, bestD = -1;
  for (let i = 0; i < 12; i++) {
    const ang = Math.random() * TAU;
    const dist = clear + Math.random() * gapExtra;
    const x = Math.max(maxW/2, Math.min(W - maxW/2, px + Math.cos(ang) * dist));
    const y = Math.max(maxH/2, Math.min(H - maxH/2, py + Math.sin(ang) * dist));
    const d = Math.hypot(x - px, y - py);
    if (d >= clear) { shapes.push(makeShape(x, y, maxW, maxH, hot)); return; }
    if (d > bestD) { bestD = d; best = { x, y }; }
  }
  shapes.push(makeShape(best.x, best.y, maxW, maxH, hot));
}

function spawnAmbush() {
  const maxDim = 90 + Math.random() * 90;
  const aspect = 0.72 + Math.random() * 0.7;
  spawnNear(maxDim, maxDim / aspect, 30, 55, true);
}

// Anti-camp — when the player camps (e.g. a corner), ink nucleates RIGHT UNDER
// the cursor from nothing and grows. This is the only case a blob spawns on you;
// it gives a beat to flee, but standing still here is lethal, never a winning hide.
function spawnUnderCursor() {
  const maxDim = 95 + Math.random() * 70;
  const aspect = 0.8 + Math.random() * 0.5;
  const s = makeShape(px, py, maxDim, maxDim / aspect, true);
  s.w = 0; s.h = 0; // start from a point so the camper gets a moment to react
  shapes.push(s);
  playAmbush();
}

// Distance from a point to the nearest ink edge (negative = inside ink).
function gapAt(x, y) {
  let g = Infinity;
  for (const s of shapes) {
    const lr = ((s.drawW || s.w) + (s.drawH || s.h)) / 2 * 0.44;
    const d = Math.hypot(x - s.x, y - s.y) - lr;
    if (d < g) g = d;
  }
  return g;
}

// Rising score popup. colorTpl contains 'A' where the fading alpha is injected.
function addFloat(x, y, text, colorTpl, size) {
  floats.push({ x, y, text, colorTpl, size, life: 850, maxLife: 850 });
}

// Spawn a mote in a risky gap — close to ink, but in safe white. Worth diving for.
function spawnMote() {
  for (let i = 0; i < 24; i++) {
    const x = 36 + Math.random() * (W - 72), y = 36 + Math.random() * (H - 72);
    if (pointCovered(x, y)) continue;
    const g = gapAt(x, y);
    if (g > 14 && g < DANGER_BAND * 0.9) {
      // first few dots carry an engaging "collect me" tag so the goal is obvious
      const msg = collected < 3 ? MOTE_MSGS[moteSpawnCount % MOTE_MSGS.length] : null;
      motes.push({ x, y, life: 5200, msg });
      moteSpawnCount++;
      return;
    }
  }
}

// No dead ends: guarantee at least one dot the player can actually reach through
// open (non-ink) space. Flood-fills the free space from the player; if no existing
// mote sits in that reachable region, drops one there (preferring a risky edge).
function ensureReachableMote() {
  const cell = 34;
  const cols = Math.max(1, Math.ceil(W / cell)), rows = Math.max(1, Math.ceil(H / cell));
  const free = new Uint8Array(cols * rows);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      free[r * cols + c] = pointCovered(c * cell + cell / 2, r * cell + cell / 2) ? 0 : 1;

  const pc = Math.min(cols - 1, Math.max(0, Math.floor(px / cell)));
  const pr = Math.min(rows - 1, Math.max(0, Math.floor(py / cell)));
  const start = pr * cols + pc;
  if (!free[start]) return; // player cell already ink → about to die anyway

  const reach = new Uint8Array(cols * rows);
  const queue = [start]; reach[start] = 1;
  for (let qi = 0; qi < queue.length; qi++) {
    const idx = queue[qi], cc = idx % cols, rr = (idx / cols) | 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nc = cc + dc, nr = rr + dr;
      if (nc < 0 || nr < 0 || nc >= cols || nr >= rows) continue;
      const ni = nr * cols + nc;
      if (reach[ni] || !free[ni]) continue;
      reach[ni] = 1; queue.push(ni);
    }
  }

  const isReachable = mo => reach[
    Math.min(rows - 1, Math.max(0, Math.floor(mo.y / cell))) * cols +
    Math.min(cols - 1, Math.max(0, Math.floor(mo.x / cell)))] === 1;
  if (motes.some(isReachable)) return; // a reachable dot already exists — all good

  // pick a reachable cell: prefer ones nearest the ink (risky) and not on the player
  const cands = [];
  for (const idx of queue) {
    const x = (idx % cols) * cell + cell / 2, y = ((idx / cols) | 0) * cell + cell / 2;
    if (Math.hypot(x - px, y - py) < 70) continue;
    cands.push({ x, y, g: gapAt(x, y) });
  }
  if (!cands.length) {
    const idx = queue[queue.length >> 1]; // tiny pocket: drop one anywhere reachable
    motes.push({ x: (idx % cols) * cell + cell / 2, y: ((idx / cols) | 0) * cell + cell / 2, life: 6000, msg: null });
    return;
  }
  cands.sort((a, b) => a.g - b.g);
  const pickC = cands[(Math.random() * Math.min(6, cands.length)) | 0];
  motes.push({ x: pickC.x, y: pickC.y, life: 6000, msg: null });
}

// ─── Start / restart ──────────────────────────────────────────────────────────
function startGame() {
  ensureAudio();
  hideNamePrompt();
  sessions++; localStorage.setItem('nerve_sessions', sessions);
  playStart();
  state = 'playing';
  nerve = 0; mult = 1; graze = 0; scoreTick = 0; elapsed = 0;
  runStartBest = highScore; hiTriggered = false; hiPulseStart = -9999;
  pulseUses = PULSE_USES; pulseActive = false; pulseElapsed = 0; ringActive = false;
  pulseIcons.forEach(ic => ic.a = 1);
  motes.length = 0; moteTimer = 0; collected = 0; moteSpawnCount = 0; reachTimer = 0;
  floats.length = 0;
  spawnTimer = -300; ambushTimer = 0; nextSpawn = 600;
  occupancy = 0; occTimer = 0; progress = 0;
  shapes.length = 0;
  px = W / 2; py = H / 2;
  campX = px; campY = py; campTime = 0;
  pdx = pdy = 0; targetX = px; targetY = py;
  pointerActive = false;
  overAlpha = 0;
}

// ─── Coverage ──────────────────────────────────────────────────────────────--
// A point is "occupied" if it falls inside any blob's lethal footprint
// (~88% of the visual radius, so the soft rim stays forgiving).
function pointCovered(x, y) {
  for (const s of shapes) {
    const ex = (x - s.x) / ((s.drawW || s.w) * 0.44 + 0.001);
    const ey = (y - s.y) / ((s.drawH || s.h) * 0.44 + 0.001);
    if (ex*ex + ey*ey <= 1) return true;
  }
  return false;
}
function playerCovered() { return pointCovered(px, py); }

// Precise occupancy — sample a grid of points and count how many are ink.
function measureOccupancy() {
  const step = Math.max(15, Math.min(W, H) / 44);
  let total = 0, cov = 0;
  for (let y = step / 2; y < H; y += step)
    for (let x = step / 2; x < W; x += step) {
      total++;
      if (pointCovered(x, y)) cov++;
    }
  occupancy = total ? cov / total : 0;
}

// ─── Game over ─────────────────────────────────────────────────────────────--
let overAlpha = 0, deathX = 0, deathY = 0, deathPal = COOL[0], deathLobes = makeLobes();
function triggerGameOver() {
  state = 'over';
  deathX = px; deathY = py;
  for (const s of shapes) {
    const ex = (px - s.x) / ((s.drawW || s.w) * 0.5 + 0.001);
    const ey = (py - s.y) / ((s.drawH || s.h) * 0.5 + 0.001);
    if (ex*ex + ey*ey <= 1) { deathPal = s.pal; deathLobes = s.lobes; break; }
  }
  overAlpha = 0;
  const finalScore = Math.round(nerve);
  saveBest();
  // submit if we know who you are; otherwise ask for a name — only after the
  // very first game ever (the name modal never nags again after that)
  if (playerName) submitScore(playerName, finalScore);
  else if (sessions === 1) setTimeout(() => showNamePrompt(finalScore), 800);
  playGameOver();
}

function saveBest() {
  const n = Math.round(nerve);
  if (n > highScore) { highScore = n; localStorage.setItem('ns_nerve', highScore); }
}

let winAlpha = 0;
function triggerWin() {
  state = 'won';
  winAlpha = 0;
  nerve += 250; // completion bonus for filling the void
  saveBest();
  if (playerName) submitScore(playerName, Math.round(nerve));
  playWin();
}

// ─── Update ────────────────────────────────────────────────────────────────--
let lastT = 0;
function update(t) {
  const dt = Math.min(t - lastT, 80);
  lastT = t;
  pulse += dt * 0.004;
  if (state === 'onboard') { updateOnboard(dt, t); return; }
  if (state !== 'playing') return;

  elapsed += dt;
  const d = difficulty();

  if (pointerActive) {
    pdx += (targetX - px) * 0.18;
    pdy += (targetY - py) * 0.18;
  }
  pdx *= 0.72; pdy *= 0.72;
  px += pdx; py += pdy;
  px = Math.max(PLAYER_R, Math.min(W - PLAYER_R, px));
  py = Math.max(PLAYER_R, Math.min(H - PLAYER_R, py));

  // ── Anti-camp: lingering in one spot (e.g. a corner) makes ink form under you ──
  if (Math.hypot(px - campX, py - campY) > CAMP_R) {
    campX = px; campY = py; campTime = 0; // roamed far enough → reset the anchor
  } else if (elapsed > 2500) {
    campTime += dt;
    if (campTime > CAMP_FULL) { campTime = 0; spawnUnderCursor(); } // camping → blob on you
  }

  spawnTimer += dt;
  if (spawnTimer >= nextSpawn) {
    spawnTimer = 0;
    // irregular cadence — sometimes a quick flurry, sometimes a long calm
    nextSpawn = d.spawnInterval * (0.4 + Math.random() * 1.3);
    spawnShape();
    // sudden burst: a cluster blooms at once (only once difficulty has ramped)
    if (Math.random() < d.burst) { spawnShape(); if (Math.random() < 0.4) spawnShape(); }
    playBloom();
  }

  ambushTimer += dt;
  if (d.ambushChance > 0 && ambushTimer >= d.ambushInterval) {
    ambushTimer = 0;
    if (Math.random() < d.ambushChance) { spawnAmbush(); playAmbush(); }
  }

  for (const s of shapes) {
    if (s.growing) {
      const rate = d.shapeSpeed * dt;
      s.w = Math.min(s.maxW, s.w + rate * (s.maxW / 180));
      s.h = Math.min(s.maxH, s.h + rate * (s.maxH / 180));
      if (s.w >= s.maxW && s.h >= s.maxH) s.growing = false;
    }
    const pf = Math.sin(t * s.pulseFreq + s.pulsePhase);
    s.drawW = s.w * (1 + pf * s.pulseAmp);
    s.drawH = s.h * (1 + pf * s.pulseAmp);
  }

  // ── PULSE: displace blobs outward, hold ~3s, then drift home (amt eases to 0) ──
  if (ringActive) { ringT += dt; if (ringT > 600) ringActive = false; }
  // icons fade: the used ones ease down toward ~18% opacity
  const used = PULSE_USES - pulseUses;
  for (let i = 0; i < pulseIcons.length; i++) {
    const tgt = i < used ? 0.18 : 1;
    pulseIcons[i].a += (tgt - pulseIcons[i].a) * Math.min(1, dt * 0.006);
  }
  if (pulseActive) {
    pulseElapsed += dt;
    const tt = pulseElapsed;
    let amt;
    if (tt < 250) amt = sstep(tt / 250);            // wave hits
    else if (tt < 3250) amt = 1;                    // hold away ~3s
    else if (tt < 5750) amt = 1 - sstep((tt - 3250) / 2500); // drift home
    else { amt = 0; pulseActive = false; }
    for (const s of shapes) {
      const hx = s.homeX ?? s.x, hy = s.homeY ?? s.y;
      if (s.pushDX === undefined) {                 // blob spawned mid-pulse — give it a dir
        let dx = hx - px, dy = hy - py, d = Math.hypot(dx, dy) || 1;
        s.pushDX = dx / d * PULSE_MAX; s.pushDY = dy / d * PULSE_MAX;
      }
      s.x = hx + s.pushDX * amt; s.y = hy + s.pushDY * amt;
    }
    if (!pulseActive) for (const s of shapes) { s.x = s.homeX ?? s.x; s.y = s.homeY ?? s.y; s.pushDX = s.pushDY = undefined; }
  }

  // proximity is still used for the player's danger glow (not for scoring)
  const gap = gapAt(px, py);
  // first critical near-miss ever → one-time SPACE TO PULSE hint
  if (!hintShown && gap < 10) {
    hintShown = true; hintStart = elapsed; localStorage.setItem('nerve_pulsehint', '1');
  }
  graze = gap < DANGER_BAND ? Math.max(0, 1 - Math.max(0, gap) / DANGER_BAND) : 0;

  // ── SCORE: multiplier = 1 + 0.1 per dot; each second adds (multiplier × 10) ──
  mult = 1 + 0.1 * collected;
  scoreTick += dt;
  while (scoreTick >= 1000) { scoreTick -= 1000; nerve += mult * 10; }

  // high-score moment — fires once, the instant you pass a real prior best
  if (!hiTriggered && runStartBest > 0 && Math.round(nerve) > runStartBest) {
    hiTriggered = true; hiPulseStart = elapsed; playHighScore();
  }

  // ── Motes: the collectibles. They sit in risky gaps; worth more the closer
  //    to the ink you grab them (current multiplier). ──
  moteTimer += dt;
  if (moteTimer > 1200 && motes.length < 5) { moteTimer = 0; spawnMote(); }
  // no dead ends: keep a reachable dot available at all times
  reachTimer += dt;
  if (reachTimer > 450) { reachTimer = 0; ensureReachableMote(); }
  for (let i = motes.length - 1; i >= 0; i--) {
    const mo = motes[i];
    mo.life -= dt;
    if (Math.hypot(px - mo.x, py - mo.y) < 18) {       // collected (hover over it)
      const gained = Math.round(mult * 10);             // worth more as the (hidden) multiplier climbs
      nerve += gained;
      collected++;
      addFloat(mo.x, mo.y, '+' + gained, 'rgba(199,154,58,A)', 16);
      motes.splice(i, 1); playMote();
    } else if (mo.life <= 0 || pointCovered(mo.x, mo.y)) {
      motes.splice(i, 1);                              // expired or swallowed by ink
    }
  }

  // rising score popups
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.life -= dt; f.y -= dt * 0.022;
    if (f.life <= 0) floats.splice(i, 1);
  }

  // run ends when the ink consumes you
  if (playerCovered()) { triggerGameOver(); return; }
}

// ─── Drawing primitives ───────────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.52, Math.max(W, H) * 0.8);
  g.addColorStop(0, '#f8f6f1');
  g.addColorStop(0.6, '#f1ede6');
  g.addColorStop(1, '#e7e1d8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawGrain() {
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = grainPattern;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// Organic liquid blob — draw each lobe at its animated drift & swell.
function drawOrb(s, alpha, t) {
  const Rx = (s.drawW || s.w) / 2, Ry = (s.drawH || s.h) / 2;
  if (Rx <= 0.5 || Ry <= 0.5) return;
  const Ravg = (Rx + Ry) / 2;
  const sprite = s.pal.lobe;
  ctx.save();
  ctx.globalAlpha = alpha;
  for (const l of s.lobes) {
    const ox = l.ox + Math.sin(t * l.fxo + l.pxo) * l.axo;
    const oy = l.oy + Math.sin(t * l.fyo + l.pyo) * l.ayo;
    const rr = Math.max(0.05, l.rr + Math.sin(t * l.fr + l.pr) * l.ar);
    const lx = s.x + ox * Rx, ly = s.y + oy * Ry;
    const d = rr * Ravg * LOBE_PAD;
    ctx.drawImage(sprite, lx - d, ly - d, d * 2, d * 2);
  }
  ctx.restore();
}

// Editorial label helper
function label(text, x, y, size, color, align = 'left', spacing = '0.22em', weight = '500') {
  ctx.font = `${weight} ${size}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'alphabetic';
  ctx.letterSpacing = spacing;
  ctx.fillText(text, x, y);
  ctx.letterSpacing = '0em';
}

const pad4 = n => String(n).padStart(4, '0');
function mmss(ms) {
  const s = Math.floor(ms / 1000);
  return String((s / 60) | 0).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function drawPlayer(x, y, extra = 0, gz = 0) {
  const r = PLAYER_R + 0.4 * Math.sin(pulse) + extra;
  // grazing glow — the dot runs hot when hugging danger (instant risk feedback)
  if (gz > 0) {
    const rg = r + 7 + gz * 16 + gz * 2 * Math.sin(pulse * 2.2);
    const a = 0.18 + gz * 0.55;
    const hot = ctx.createRadialGradient(x, y, r, x, y, rg);
    hot.addColorStop(0, `rgba(240,86,96,${a})`);
    hot.addColorStop(1, 'rgba(240,86,96,0)');
    ctx.fillStyle = hot;
    ctx.beginPath(); ctx.arc(x, y, rg, 0, Math.PI * 2); ctx.fill();
  }
  // soft luminous halo so the dot reads on any colour
  const h = ctx.createRadialGradient(x, y, 0, x, y, r + 9);
  h.addColorStop(0, 'rgba(255,255,255,0.85)');
  h.addColorStop(0.5, 'rgba(255,255,255,0.35)');
  h.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = h;
  ctx.beginPath(); ctx.arc(x, y, r + 9, 0, Math.PI * 2); ctx.fill();
  // dark core with subtle vertical shading
  const core = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
  core.addColorStop(0, '#4a4754');
  core.addColorStop(1, '#1c1a24');
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

// ─── Editorial ink tones ─────────────────────────────────────────────────────
const INK = '#7c766c', INK_SOFT = '#a8a298', INK_FAINT = 'rgba(124,118,108,0.45)';

// ─── Screens ───────────────────────────────────────────────────────────────--
const heroOrb = { x: 0, y: 0, w: 0, h: 0, drawW: 0, drawH: 0, pal: COOL[0],
                  lobes: makeLobes() };
// palettes the hero blob drifts through as it breathes
const HERO_CYCLE = [COOL[0], COOL[1], COOL[2], HOT[3], HOT[1], HOT[0]];
const HERO_HOLD = 5200; // ms per colour

function drawIntro(t) {
  drawBg();
  ctx.textAlign = 'center';

  // ── Title + instruction lines, above the blob ──
  const tSize = Math.min(70, W * 0.135);
  const iy = H * 0.16 + tSize * 0.6, isz = Math.min(11, W * 0.024);
  label('NERVE', W / 2, H * 0.16, tSize, '#3f3a33', 'center', '0.4em', '700');
  label('COLLECT DOTS.  AVOID BLOBS.', W / 2, iy, isz, INK_SOFT, 'center', '0.42em', '500');

  // ── Hero blob (atmospheric) — breathing + colour drift ──
  const base = Math.min(W, H) * 0.30;
  const pf = Math.sin(t * 0.0011);
  heroOrb.x = W / 2; heroOrb.y = H * 0.48;
  heroOrb.drawW = heroOrb.drawH = base * (1 + pf * 0.05);
  const span = (t % (HERO_HOLD * HERO_CYCLE.length)) / HERO_HOLD;
  const i0 = Math.floor(span) % HERO_CYCLE.length, i1 = (i0 + 1) % HERO_CYCLE.length;
  const f = span - Math.floor(span), e = f * f * (3 - 2 * f); // smoothstep crossfade
  heroOrb.pal = HERO_CYCLE[i0]; drawOrb(heroOrb, 1 - e, t);
  heroOrb.pal = HERO_CYCLE[i1]; drawOrb(heroOrb, e, t);

  // ── Ambient dots — fade in/out at random spots; the world is already alive ──
  if (t >= introNextSpawn && introDots.length < 3) {
    const bandTop = H * 0.28, bandBot = H * 0.74;
    introDots.push({ x: W * 0.08 + Math.random() * W * 0.84, y: bandTop + Math.random() * (bandBot - bandTop), born: t });
    introNextSpawn = t + (introDots.length < 2 ? 300 : 800 + Math.random() * 700);
  }
  for (let i = introDots.length - 1; i >= 0; i--) {
    const dt2 = t - introDots[i].born;
    if (dt2 > 2800) { introDots.splice(i, 1); continue; }
    let da = 1;
    if (dt2 < 800) da = dt2 / 800;
    else if (dt2 > 2000) da = 1 - (dt2 - 2000) / 800;
    ctx.globalAlpha = Math.max(0, da);
    drawMote({ x: introDots[i].x, y: introDots[i].y, life: 9999, msg: null }, t);
    ctx.globalAlpha = 1;
  }

  // ── CTA — detached, below the blob, the last thing you read ──
  const blink = 0.55 + 0.45 * Math.sin(t * 0.0024);
  ctx.globalAlpha = blink;
  label('TAP TO BEGIN', W / 2, H * 0.82, Math.min(12, W * 0.026), '#3f3a33', 'center', '0.44em', '600');
  ctx.globalAlpha = 1;
  linkIntroBoard = null;

  drawGrain();
}

// A collectible glint — amber so it reads on the cream paper, with a target ring
// that pulses so it reads as a "step here for points" zone.
function drawMote(mo, t) {
  const tw = 0.55 + 0.45 * Math.sin(t * 0.006 + mo.x * 0.05);
  const fade = Math.min(1, mo.life / 900);
  const g = ctx.createRadialGradient(mo.x, mo.y, 0, mo.x, mo.y, 17);
  g.addColorStop(0,   `rgba(255,206,110,${0.95 * tw * fade})`);
  g.addColorStop(0.5, `rgba(244,176,86,${0.40 * tw * fade})`);
  g.addColorStop(1,   'rgba(244,176,86,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(mo.x, mo.y, 17, 0, Math.PI * 2); ctx.fill();
  // pulsing target ring
  const ring = 9 + 4 * (0.5 + 0.5 * Math.sin(t * 0.005 + mo.y * 0.05));
  ctx.strokeStyle = `rgba(199,154,58,${0.5 * fade})`;
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(mo.x, mo.y, ring, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = `rgba(80,60,30,${0.6 * fade})`;
  ctx.beginPath(); ctx.arc(mo.x, mo.y, 1.7, 0, Math.PI * 2); ctx.fill();
  // engaging "collect me" tag on the first dots, gently bobbing
  if (mo.msg) {
    const bob = Math.sin(t * 0.005 + mo.x) * 2;
    label(mo.msg, mo.x, mo.y - 20 + bob, 10, `rgba(199,140,48,${0.9 * fade})`, 'center', '0.18em', '700');
  }
}

// Rising "+NERVE" popups.
function drawFloats() {
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0.04em';
  for (const f of floats) {
    const a = Math.max(0, f.life / f.maxLife);
    ctx.font = `700 ${f.size}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
    ctx.fillStyle = f.colorTpl.replace('A', (a * 0.9).toFixed(2));
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.letterSpacing = '0em';
}

// Unified close button — one × top-right on every overlay. Returns its tap rect.
function drawCloseX() {
  const m = Math.max(18, Math.min(W, H) * 0.05);
  label('×', W - m, m + 24, 26, INK, 'right', '0em', '400');
  return { x: W - m - 42, y: m - 4, w: 54, h: 54 };
}

function drawGame(t) {
  drawBg();
  for (const s of shapes) drawOrb(s, 1, t);
  for (const mo of motes) drawMote(mo, t);

  // camp warning — a tightening ring forms under a lingering player before ink does
  if (campTime > CAMP_FULL - CAMP_WARN) {
    const w = (campTime - (CAMP_FULL - CAMP_WARN)) / CAMP_WARN; // 0→1
    const rr = 46 * (1 - w) + 10;
    ctx.strokeStyle = `rgba(214,74,86,${0.25 + 0.55 * w})`;
    ctx.lineWidth = 1.5 + w * 1.5;
    ctx.beginPath(); ctx.arc(px, py, rr, 0, Math.PI * 2); ctx.stroke();
    if (w > 0.4) { ctx.textAlign = 'center'; label('MOVE', px, py - rr - 8, 9, `rgba(214,74,86,${w})`, 'center', '0.3em', '700'); }
  }

  // pulse wave — one clean expanding ring, warm gold like the collectible dots
  if (ringActive) {
    const k = ringT / 600, r = 300 * sstep(k);
    ctx.strokeStyle = `rgba(244,176,86,${0.4 * (1 - k)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ringX, ringY, r, 0, Math.PI * 2); ctx.stroke();
  }

  drawPlayer(px, py, 0, graze);
  drawFloats();

  const m = Math.max(18, Math.min(W, H) * 0.05);

  // top-right — current score is the hero; BEST is a quiet reference beneath it
  // (until you pass it, when it disappears). Multiplier still runs, just not shown.
  let sc = 1; const pt = elapsed - hiPulseStart;   // high-score pulse: 100→115→100%
  if (pt >= 0 && pt < 200) { const k = pt / 200; sc = 1 + 0.15 * (k * k * (3 - 2 * k)); }
  else if (pt >= 200 && pt < 500) { const k = (pt - 200) / 300; sc = 1.15 - 0.15 * (k * k * (3 - 2 * k)); }
  label(Math.round(nerve).toString(), W - m, m + 40, Math.min(40, W * 0.078) * sc, '#3f3a33', 'right', '0.02em', '700');
  let ny = m + 62;
  if (runStartBest > 0 && Math.round(nerve) <= runStartBest) {
    label('BEST  ' + runStartBest, W - m, ny, 9, INK_SOFT, 'right', '0.24em', '500'); ny += 20;
  }

  // pulse charges — three warm-gold dots below the score
  const dotY = ny + 4;
  for (let i = 0; i < 3; i++) {
    const dx = W - m - (2 - i) * 16;
    const gl = Math.max(0, (pulseIcons[i].a - 0.18) / 0.82); // 1 active → 0 used (no glow)
    const g = ctx.createRadialGradient(dx, dotY, 0, dx, dotY, 9);
    g.addColorStop(0,   `rgba(255,206,110,${0.95 * gl})`);
    g.addColorStop(0.5, `rgba(244,176,86,${0.4 * gl})`);
    g.addColorStop(1,   'rgba(244,176,86,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(dx, dotY, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(120,85,35,${0.2 + 0.6 * gl})`;
    ctx.beginPath(); ctx.arc(dx, dotY, 2, 0, Math.PI * 2); ctx.fill();
  }

  // bottom-left — quiet survival clock
  label(mmss(elapsed), m, H - m, 12, INK_SOFT, 'left', '0.12em', '600');

  // one-time critical-moment hint — centered near the bottom
  const ht = elapsed - hintStart;
  if (ht >= 0 && ht < 2600) {
    const ha = ht < 300 ? ht / 300 : ht > 2300 ? 1 - (ht - 2300) / 300 : 1;
    ctx.globalAlpha = Math.max(0, ha);
    label('SPACE TO PULSE', W / 2, H * 0.9, Math.min(11, W * 0.024), INK_SOFT, 'center', '0.34em', '600');
    ctx.globalAlpha = 1;
  }

  drawGrain();
}

function drawOver(t) {
  // frozen scene
  drawBg();
  for (const s of shapes) drawOrb(s, 1, t);

  // warm veil settles over the scene
  overAlpha = Math.min(1, overAlpha + 0.018);
  ctx.fillStyle = `rgba(241,237,230,${overAlpha * 0.86})`;
  ctx.fillRect(0, 0, W, H);

  // a final bloom where the player was consumed
  if (overAlpha < 0.9) {
    const bloomR = overAlpha * Math.max(W, H) * 0.18;
    drawOrb({ x: deathX, y: deathY, drawW: bloomR * 2, drawH: bloomR * 2,
              pal: deathPal, lobes: deathLobes }, (1 - overAlpha) * 0.9, t);
  }

  drawGrain();
  if (overAlpha < 0.35) return;
  const a = Math.min(1, (overAlpha - 0.35) / 0.4);
  ctx.globalAlpha = a;

  // Permanent, clean death screen — name capture is a separate modal on top.
  const nv = Math.round(nerve), cx = W / 2;
  const newBest = runStartBest > 0 && nv > runStartBest;   // beat a real prior best
  ctx.globalAlpha = a;

  label('CAUGHT', cx, H * 0.24, Math.min(49, W * 0.103), '#3f3a33', 'center', '0.32em', '700');

  // while the floating name prompt is up, it owns the centre. Show CAUGHT, and —
  // only if this run beat the previous best — a NEW BEST block above the prompt.
  if (namePrompt) {
    linkOverBoard = linkOverClose = null;
    if (nv > runStartBest) {
      label('NEW BEST', cx, H * 0.34, 10, INK_SOFT, 'center', '0.34em', '600');
      label(String(nv), cx, H * 0.34 + 46, Math.min(42, W * 0.09), '#3f3a33', 'center', '0.02em', '700');
    }
    ctx.globalAlpha = 1; return;
  }

  if (newBest) label('NEW BEST', cx, H * 0.45, 10, INK_SOFT, 'center', '0.34em', '600');

  // stat columns — SCORE and BEST only, equal spacing
  const cols = [['SCORE', String(nv)], ['BEST', String(highScore)]];
  const colGap = Math.min(180, W * 0.26), n = cols.length;
  const labelY = H * 0.51, valueY = H * 0.51 + 44, vSize = Math.min(40, W * 0.082);
  for (let i = 0; i < n; i++) {
    const colx = cx - colGap * (n - 1) / 2 + i * colGap;
    label(cols[i][0], colx, labelY, 10, INK_SOFT, 'center', '0.28em', '500');
    label(cols[i][1], colx, valueY, vSize, '#3f3a33', 'center', '0.02em', '700');
  }

  // actions — TAP TO TRY AGAIN is primary (full opacity); LEADERBOARD is the same
  // size/weight but quieter (60%). Both flat, no boxes.
  const rowY = H * 0.72, colW = Math.min(W * 0.82, 520), asz = Math.min(12, W * 0.026);
  const m = Math.max(18, Math.min(W, H) * 0.05);
  label('TAP TO TRY AGAIN', cx - colW / 2, rowY, asz, '#3f3a33', 'left', '0.28em', '600');
  ctx.globalAlpha = a * 0.6;
  label('LEADERBOARD', cx + colW / 2, rowY, asz, '#3f3a33', 'right', '0.28em', '600');
  linkOverBoard = { x: cx + colW / 2 - 190, y: rowY - 24, w: 200, h: 44 };

  // close × — top-right, same muted style, returns to the intro screen
  linkOverClose = drawCloseX();
  ctx.globalAlpha = 1;
}

// ─── Success screen ──────────────────────────────────────────────────────────
function drawWin(t) {
  drawBg();
  for (const s of shapes) drawOrb(s, 1, t);

  // light luminous veil fills in — the void becomes whole, calm, complete
  winAlpha = Math.min(1, winAlpha + 0.014);
  ctx.fillStyle = `rgba(248,246,241,${winAlpha * 0.82})`;
  ctx.fillRect(0, 0, W, H);

  drawGrain();
  if (winAlpha < 0.35) return;
  const a = Math.min(1, (winAlpha - 0.35) / 0.45);
  ctx.globalAlpha = a;

  label('COMPLETE', W / 2, H * 0.38, Math.min(36, W * 0.076), '#3f3a33', 'center', '0.34em', '700');
  label('YOU FILLED THE VOID', W / 2, H * 0.47, 10, INK_SOFT, 'center', '0.3em', '500');
  label(Math.round(nerve).toString(), W / 2, H * 0.47 + 48, Math.min(52, W * 0.108), '#c79a3a', 'center', '0.02em', '700'); // gold nerve
  label('SCORE  ·  ' + mmss(elapsed) + (Math.round(nerve) >= highScore ? '  ·  NEW BEST' : ''),
        W / 2, H * 0.61, 10, INK_FAINT, 'center', '0.24em', '500');

  const blink = 0.55 + 0.45 * Math.sin(t * 0.0024);
  ctx.globalAlpha = a * blink;
  label('TAP TO PLAY AGAIN', W / 2, H * 0.78, Math.min(12, W * 0.028), '#3f3a33', 'center', '0.32em', '600');
  ctx.globalAlpha = 1;
}

// ─── Non-interactive onboarding — illustrative scene behind each beat's text ─
function drawOnboard(t) {
  drawBg();
  for (const s of shapes) drawOrb(s, 1, t);            // drifting blobs
  for (const mo of motes) drawMote(mo, t);             // the dot
  if (ringActive) {                                    // pulse wave demo
    const k = ringT / 600, r = 300 * sstep(k);
    ctx.strokeStyle = `rgba(244,176,86,${0.4 * (1 - k)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ringX, ringY, r, 0, Math.PI * 2); ctx.stroke();
  }

  // beat text with fade in / hold / fade out
  let txt, lt, hold;
  if (obT < 2100)      { txt = 'COLLECT DOTS';           lt = obT;        hold = 1500; }
  else if (obT < 4200) { txt = 'AVOID BLOBS';            lt = obT - 2100; hold = 1500; }
  else if (obT < 6300) { txt = 'SPACE TO PULSE';         lt = obT - 4200; hold = 1500; }
  else                 { txt = 'HOW LONG CAN YOU LAST?'; lt = obT - 6300; hold = 1200; }
  const a = lt < 300 ? lt / 300 : lt < 300 + hold ? 1 : lt < 600 + hold ? 1 - (lt - 300 - hold) / 300 : 0;
  ctx.globalAlpha = Math.max(0, Math.min(1, a));
  label(txt, W / 2, H * 0.3, Math.min(32, W * 0.066), '#3f3a33', 'center', '0.34em', '700');
  ctx.globalAlpha = 1;

  drawGrain();
}

// ─── Leaderboard ─────────────────────────────────────────────────────────────
function drawBoard(t) {
  drawBg();
  const m = Math.max(18, Math.min(W, H) * 0.05);
  const tSize = Math.min(70, W * 0.135);
  label('NERVE', W / 2, H * 0.14, tSize, '#3f3a33', 'center', '0.4em', '700');
  label('TOP SCORES', W / 2, H * 0.14 + tSize * 0.6, Math.min(11, W * 0.024), INK_SOFT, 'center', '0.42em', '500');
  drawCloseX();

  if (boardRows === null) { label('LOADING…', W / 2, H * 0.5, 11, INK_SOFT, 'center', '0.3em', '500'); drawGrain(); return; }
  if (!boardRows.length)  { label('NO SCORES YET', W / 2, H * 0.5, 11, INK_SOFT, 'center', '0.3em', '500'); drawGrain(); return; }

  const colW = Math.min(W * 0.72, 460);
  const lx = W / 2 - colW / 2, rx = W / 2 + colW / 2;
  const rowH = Math.min(38, H * 0.055), top = H * 0.30;
  // one row: current player at full opacity + bolder, everyone else at 50%
  const drawRow = (rank, name, score, y, mine) => {
    ctx.globalAlpha = mine ? 1 : 0.5;
    label(String(rank).padStart(2, '0'), lx, y, 11, INK_SOFT, 'left', '0.1em', '600');
    label((name || '—').toUpperCase(), lx + 46, y, 12, '#3f3a33', 'left', '0.16em', mine ? '700' : '500');
    ctx.font = `${mine ? 700 : 600} 13px 'SF Mono', ui-monospace, Menlo, monospace`;
    ctx.fillStyle = '#3f3a33'; ctx.textAlign = 'right'; ctx.letterSpacing = '0em';
    ctx.fillText(String(score), rx, y);
    ctx.globalAlpha = 1;
  };
  for (let i = 0; i < boardRows.length; i++) {
    const row = boardRows[i];
    const mine = playerName && row.name && row.name.toUpperCase() === playerName.toUpperCase();
    drawRow(i + 1, row.name, row.score, top + i * rowH, mine);
  }
  // player not in top 10 → their row below a thin separator, with real rank
  if (boardMe && boardMe.rank > 10) {
    const sy = top + boardRows.length * rowH + rowH * 0.35;
    ctx.globalAlpha = 0.35; ctx.fillStyle = 'rgba(124,118,108,0.5)';
    ctx.fillRect(lx, sy, colW, 1); ctx.globalAlpha = 1;
    drawRow(boardMe.rank, boardMe.name, boardMe.score, sy + rowH * 0.75, true);
  }
  label('TAP ANYWHERE TO CLOSE', W / 2, H * 0.93, 9, INK_FAINT, 'center', '0.28em', '500');
  drawGrain();
}

// ─── Loop ──────────────────────────────────────────────────────────────────--
function loop(t) {
  update(t);
  if      (state === 'intro')   drawIntro(t);
  else if (state === 'onboard') drawOnboard(t);
  else if (state === 'playing') drawGame(t);
  else if (state === 'won')     drawWin(t);
  else if (state === 'board')   drawBoard(t);
  else                          drawOver(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
